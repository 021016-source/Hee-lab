<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Heejung Science Archive</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Heejung Science Archive</h1>
<p>Biomedical Research Archive</p>
</header>

<div class="search-box">
<input type="text" placeholder="Search research...">
<button>Search</button>
</div>

<!-- 최근 게시물 -->
<section class="recent-section">
  <h2>Recent</h2>
  <div class="recent-container" id="recentContainer"></div>
</section>

<!-- 카테고리 -->
<section class="category-section">
  <div class="categories">
    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('bio')">의생명</button>
    <button onclick="filterCategory('math')">수학</button>
    <button onclick="filterCategory('science')">과학</button>
    <button onclick="filterCategory('social')">사회</button>
  </div>
</section>

<!-- 게시물 -->
<section class="posts-section">
  <div id="postsContainer"></div>
</section>
