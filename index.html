<!DOCTYPE html>

<html lang="ko">

<head>
<meta charset="UTF-8">
<title>Heejung Science Archive</title>

<style>
body {
  font-family: 'Noto Sans KR', sans-serif;
  margin: 0;
  background: #fff;
  color: #111;
}

/* 배너 */
header {
  text-align: center;
  padding: 60px 20px 20px;
}

header h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

header p {
  color: #666;
}

/* 검색 */
.search-box {
  text-align: center;
  margin: 20px 0;
}

.search-box input {
  width: 300px;
  padding: 10px;
  border: 1px solid #ccc;
}

/* 최근 게시물 */
.recent-section {
  margin-top: 40px;
}

.recent-section h2 {
  text-align: center;
}

.recent-container {
  display: flex;
  overflow-x: auto;
  gap: 20px;
  padding: 20px;
}

.recent-card {
  min-width: 250px;
  border: 1px solid #ddd;
  padding: 15px;
}

/* 카테고리 */
.categories {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 30px 0;
}

.categories button {
  padding: 8px 15px;
  border: 1px solid #aaa;
  background: none;
  cursor: pointer;
}

.categories button:hover {
  border-color: #000;
}

/* 게시물 */
.post {
  border-bottom: 1px solid #eee;
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

a {
  text-decoration: none;
  color: inherit;
}

a:hover {
  text-decoration: underline;
}
</style>

</head>

<body>

<header>
<h1>Heejung Science Archive</h1>
<p>Biomedical Research Archive</p>
</header>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search research...">
</div>

<!-- 최근 -->

<section class="recent-section">
<h2>Recent</h2>
<div class="recent-container" id="recentContainer"></div>
</section>

<!-- 카테고리 -->

<section class="category-section">
<div class="categories">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('bio')">의생명</button>
<button onclick="filterCategory('math')">수학</button>
<button onclick="filterCategory('science')">과학</button>
<button onclick="filterCategory('social')">사회</button>
</div>
</section>

<!-- 게시물 -->

<section class="posts-section">
<div id="postsContainer"></div>
</section>

<script>
const posts = [
  {
    title: "켄타우로스 구조역학 분석",
    category: "bio",
    date: "2025-11",
    content: "골격 및 신경계 통합 문제에 대한 의생명학적 접근",
    link: "posts/centaur-biomechanics.html"
  },
  {
    title: "재생 의학 - 자가면역질환",
    category: "Med",
    date: "2025-5",
    content: "류마티스 관절염의 (구)치료법과 자가면역치료법",
    link: "#"
  },
];

// 게시물 렌더링
function renderPosts(filteredPosts) {
  const container = document.getElementById("postsContainer");
  container.innerHTML = "";

  filteredPosts.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = `
      <a href="${post.link}">
        <h3>${post.title}</h3>
        <p>${post.content}</p>
        <small>${post.date}</small>
      </a>
    `;
    container.appendChild(div);
  });
}

// 카테고리 필터
function filterCategory(category) {
  if (category === "all") {
    renderPosts(posts);
  } else {
    renderPosts(posts.filter(p => p.category === category));
  }
}

// 최근 게시물
function renderRecent() {
  const container = document.getElementById("recentContainer");

  const sorted = [...posts].sort((a,b) => b.date.localeCompare(a.date));

  sorted.slice(0,5).forEach(post => {
    const div = document.createElement("div");
    div.className = "recent-card";
    div.innerHTML = `
      <a href="${post.link}">
        <h4>${post.title}</h4>
        <small>${post.date}</small>
      </a>
    `;
    container.appendChild(div);
  });
}

// 검색
document.getElementById("searchInput").addEventListener("input", function() {
  const keyword = this.value.toLowerCase();
  const filtered = posts.filter(p => 
    p.title.toLowerCase().includes(keyword) ||
    p.content.toLowerCase().includes(keyword)
  );
  renderPosts(filtered);
});

// 실행
renderPosts(posts);
renderRecent();
</script>

</body>
</html>
